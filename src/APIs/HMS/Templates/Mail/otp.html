<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <!-- Ensures correct rendering on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>OTP</title>

    <!-- Preheader text (inbox preview) -->
    <meta name="description" content="Short preview of your email…">

    <style>
        /* -------------------- Base Resets -------------------- */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
        }

        * {
            -ms-text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        table, td {
            mso-table-lspace: 0pt !important;
            mso-table-rspace: 0pt !important;
        }

        table {
            border-collapse: collapse !important;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            outline: none;
            text-decoration: none;
            display: block;
        }

        a {
            text-decoration: none;
        }
            /* iOS blue links */
            a[x-apple-data-detectors] {
                color: inherit !important;
                text-decoration: none !important;
            }
        /* Gmail dark mode padding fix */
        u + #body a {
            color: inherit;
            text-decoration: none;
        }

        /* -------------------- Mobile Styles -------------------- */
        @media only screen and (max-width:600px) {
            .container {
                width: 100% !important;
            }

            .stack {
                display: block !important;
                width: 100% !important;
            }

            .p-sm {
                padding: 16px !important;
            }

            .pt-sm {
                padding-top: 16px !important;
            }

            .px-sm {
                padding-left: 16px !important;
                padding-right: 16px !important;
            }

            .center-sm {
                text-align: center !important;
            }

            .btn a {
                padding: 14px 22px !important;
                font-size: 16px !important;
                display: inline-block !important;
            }

            .h1 {
                font-size: 24px !important;
                line-height: 32px !important;
            }

            .h2 {
                font-size: 18px !important;
                line-height: 26px !important;
            }
        }

        /* -------------------- Dark Mode Hints (supported clients) -------------------- */
        @media (prefers-color-scheme: dark) {
            body, .bg-body {
                background: #0f1115 !important;
            }

            .card {
                background: #171a21 !important;
            }

            .text {
                color: #e6e6e6 !important;
            }

            .muted {
                color: #a8b0b9 !important;
            }

            .btn a {
                background: #4f8cff !important;
                color: #ffffff !important;
            }
        }
    </style>
    <!--[if mso]>
    <style type="text/css">
      .fallback-font { font-family: Arial, sans-serif !important; }
    </style>
    <![endif]-->
</head>

<body id="body" class="bg-body" bgcolor="#f3f5f9" style="background:#f3f5f9; margin:0; padding:0;">
    <!-- Preheader (hidden in body, shown in inbox preview) -->
    <div style="display:none; max-height:0; overflow:hidden; mso-hide:all;">
        OTP
    </div>

    <!-- Full-Width Wrapper -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f3f5f9">
        <tr>
            <td align="center" style="padding:24px 12px;">
                <!-- 600px Container -->
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" class="container" style="width:600px; max-width:600px; background:#ffffff; border-radius:14px; overflow:hidden;">
                    <!-- Main Copy -->
                    <tr>
                        <td class="px-sm p-sm fallback-font text" style="padding:24px 32px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#2b2f36; font-size:16px; line-height:24px;">
                            <p style="margin:0 0 16px;">Dear {{User}},</p>
                            <p style="margin:0 0 16px;">
                                OTP to Reset your password is {{OTP}}.
                            </p>
                            <p style="margin:0 0 16px;">
                                If you have not attempted to reset the password, please contact the admin.
                            </p>
                        </td>
                    </tr>
                    <!-- Callout Card -->
                    <tr>
                        <td class="px-sm" style="padding:0 32px 24px;">
                            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="card" style="background:#f7f9fc; border-radius:12px;">
                                <tr>
                                    <td class="p-sm fallback-font text" style="padding:18px 20px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#2b2f36; font-size:15px; line-height:22px;">
                                        <strong class="h2" style="display:block; font-size:20px; line-height:28px; margin:0 0 6px;">Not Able to log/reset password?</strong>
                                        Please reach us helpdesk@hms.com or 9833985555
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <!-- Divider -->
                    <tr>
                        <td style="padding:0 32px;">
                            <hr style="border:none; border-top:1px solid #e6e9ef; margin:0;">
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
    <!-- Gmail iOS right gutter fix -->
    <div style="display:none; white-space:nowrap; font:15px monospace; line-height:0;">&nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp; &nbsp;</div>
</body>
</html>
