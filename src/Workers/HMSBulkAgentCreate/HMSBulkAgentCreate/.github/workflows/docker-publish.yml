name: Build and Publish Docker image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Adjust PROJECT_PATH if your project folder name differs
  PROJECT_PATH: ./HMSBulkAgentCreate
  IMAGE_NAME: hmsbulkagentcreate
  IMAGE_TAG: ${{ github.sha }}
  # Set REGISTRY in repository Secrets (e.g. myacr.azurecr.io or docker.io/myorg)
  REGISTRY: ${{ secrets.REGISTRY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ${{ env.PROJECT_PATH }}/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}